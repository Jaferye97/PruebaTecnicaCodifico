<h4 class="text-center">Sales Date Prediction</h4>

<form [formGroup]="form" class="p-4 border rounded shadow-sm">
  <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
    <h4 class="text-start">Customers</h4>
    <mat-form-field appearance="fill" class="w-100 mb-3">
      <mat-label>Customer Name</mat-label>
      <input matInput formControlName="search" (keyup.enter)="onSearch()" />
      <button
        mat-icon-button
        matSuffix
        (click)="onSearch()"
        aria-label="Search"
      >
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </div>
</form>

<table
  mat-table
  [dataSource]="customers"
  matSort
  class="mat-elevation-z2 w-100"
>
  <!-- Name Column -->
  <ng-container matColumnDef="companyName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="companyName">
      Customer Name
    </th>
    <td mat-cell *matCellDef="let element">{{ element.companyName }}</td>
  </ng-container>

  <!-- Last Order Column -->
  <ng-container matColumnDef="lastOrderDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="lastOrderDate">
      Last Order Date
    </th>
    <td mat-cell *matCellDef="let element">
      {{ element.lastOrderDate | date : "MM/dd/yyyy" }}
    </td>
  </ng-container>

  <!-- Next Order Column -->
  <ng-container matColumnDef="nextPredictedOrder">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="nextPredictedOrder">
      Next Predicted Order
    </th>
    <td mat-cell *matCellDef="let element">
      {{ element.nextPredictedOrder | date : "MM/dd/yyyy" }}
    </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let element">
      <span class="text-danger fw-bold me-3 cursor-pointer">VIEW ORDERS</span>
      <span class="text-success fw-bold cursor-pointer">NEW ORDER</span>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<mat-paginator [pageSize]="10" showFirstLastButtons></mat-paginator>
