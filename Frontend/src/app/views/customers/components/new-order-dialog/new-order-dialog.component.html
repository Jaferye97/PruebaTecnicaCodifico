<h2 mat-dialog-title class="bg-success text-white px-3 py-2">
  {{ data.customerName }} - New Order
</h2>

<form [formGroup]="orderForm" class="p-3">
  <section>
    <h5 class="mb-3 fw-bold">Order</h5>
    <div class="row">
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Employee</mat-label>
          <mat-select formControlName="empId">
            <mat-option *ngFor="let emp of employees" [value]="emp.empId">
              {{ emp.fullName }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Shipper</mat-label>
          <mat-select formControlName="shipperId">
            <mat-option *ngFor="let ship of shippers" [value]="ship.shipperId">
              {{ ship.companyName }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <mat-form-field class="w-100">
      <mat-label>Ship Name</mat-label>
      <input matInput formControlName="shipName" />
    </mat-form-field>

    <div class="row">
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>Ship Address</mat-label>
          <input matInput formControlName="shipAddress" />
        </mat-form-field>
      </div>
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>Ship City</mat-label>
          <input matInput formControlName="shipCity" />
        </mat-form-field>
      </div>
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>Ship Country</mat-label>
          <input matInput formControlName="shipCountry" />
        </mat-form-field>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4">
        <mat-form-field class="w-100">
          <mat-label>Order Date</mat-label>
          <input
            matInput
            [matDatepicker]="picker1"
            formControlName="orderDate"
            readonlyInput
          />
          <mat-datepicker-toggle
            matSuffix
            [for]="picker1"
          ></mat-datepicker-toggle>
          <mat-datepicker #picker1></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="col-md-4">
        <mat-form-field class="w-100">
          <mat-label>Required Date</mat-label>
          <input
            matInput
            [matDatepicker]="picker2"
            formControlName="requiredDate"
          />
          <mat-datepicker-toggle
            matIconSuffix
            [for]="picker2"
          ></mat-datepicker-toggle>
          <mat-datepicker #picker2></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="col-md-4">
        <mat-form-field class="w-100">
          <mat-label>Shipped Date</mat-label>
          <input
            matInput
            [matDatepicker]="picker3"
            formControlName="shippedDate"
          />
          <mat-datepicker-toggle
            matSuffix
            [for]="picker3"
          ></mat-datepicker-toggle>
          <mat-datepicker #picker3></mat-datepicker>
        </mat-form-field>
      </div>
    </div>

    <mat-form-field class="w-100">
      <mat-label>$ Freight</mat-label>
      <input matInput type="number" formControlName="freight" />
    </mat-form-field>
  </section>

  <section>
    <h5 class="mb-3 fw-bold">Order Details</h5>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Product</mat-label>
      <mat-select formControlName="productId">
        <mat-option *ngFor="let p of products" [value]="p.productId">
          {{ p.productName }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="row">
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>$ Unit Price</mat-label>
          <input matInput type="number" formControlName="unitPrice" />
        </mat-form-field>
      </div>
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="qty" />
        </mat-form-field>
      </div>
      <div class="col">
        <mat-form-field class="w-100">
          <mat-label>Discount</mat-label>
          <input matInput type="number" formControlName="discount" />
        </mat-form-field>
      </div>
    </div>
  </section>

  <div class="d-flex justify-content-end mt-3">
    <button mat-button (click)="close()">CLOSE</button>
    <button mat-button color="primary" (click)="saveOrder()">SAVE</button>
  </div>
</form>
